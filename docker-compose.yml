services:

    app:
        build:
            context: .
            dockerfile: Dockerfile
        container_name: chat-app
        restart: unless-stopped
        working_dir: /var/www
        volumes:
            - .:/var/www
        depends_on:
            - mysql
            - redis
        networks:
            - laravel

    nginx:
        image: nginx:alpine
        container_name: chat-nginx
        restart: unless-stopped
        ports:
            - "8000:80"
        volumes:
            - .:/var/www
            - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
        depends_on:
            - app
        networks:
            - laravel

    mysql:
        image: mysql:8.4
        container_name: chat-mysql
        restart: unless-stopped
        ports:
            - "3306:3306"
        environment:
            MYSQL_ROOT_PASSWORD: root
            MYSQL_DATABASE: chat_app
        volumes:
            - mysql_data:/var/lib/mysql
        networks:
            - laravel

    redis:
        image: redis:7-alpine
        container_name: chat-redis
        restart: unless-stopped
        ports:
            - "6379:6379"
        networks:
            - laravel

    horizon:
        build:
            context: .
            dockerfile: Dockerfile
        container_name: chat-horizon
        restart: unless-stopped
        working_dir: /var/www
        command: php artisan horizon
        volumes:
            - .:/var/www
        depends_on:
            - mysql
            - redis
        networks:
            - laravel

    reverb:
        build:
            context: .
            dockerfile: Dockerfile
        container_name: chat-reverb
        restart: unless-stopped
        working_dir: /var/www
        command: php artisan reverb:start --host=0.0.0.0 --port=8080
        ports:
            - "8080:8080"
        volumes:
            - .:/var/www
        depends_on:
            - redis
        networks:
            - laravel

volumes:
    mysql_data:

networks:
    laravel:
        driver: bridge
